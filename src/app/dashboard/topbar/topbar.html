<div class="flex items-center justify-between h-20 px-8 bg-white/80 backdrop-blur-md border-b border-surface-100 sticky top-0 z-30">
  <div class="flex items-center space-x-6">
    <!-- Sidebar Toggle -->
    <button 
      class="p-2 rounded-xl text-gray-400 hover:bg-surface-50 hover:text-primary-500 transition-all duration-200 focus:outline-none" 
      (click)="onToggleSidebar()"
    >
      <svg class="h-6 w-6 transition-transform duration-300" [ngClass]="{'rotate-180': !isSidebarVisible}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
      </svg>
    </button>

    <!-- Breadcrumb & Back Arrow -->
    <div class="flex items-center space-x-2">
      <button 
        *ngIf="showBackArrow" 
        class="p-1.5 rounded-lg text-gray-400 hover:bg-surface-50 hover:text-primary-500 transition-all" 
        (click)="navigateBack()"
      >
        <mat-icon class="!text-xl">arrow_back</mat-icon>
      </button>
      <div class="h-6 w-px bg-surface-100 mx-2" *ngIf="showBackArrow"></div>
      <app-breadcrumb></app-breadcrumb>
    </div>
  </div>

  <!-- Right Actions -->
  <div class="flex items-center space-x-3">
    <!-- Notifications -->
    <button class="p-2.5 rounded-xl text-gray-400 hover:bg-surface-50 hover:text-primary-500 transition-all relative group">
      <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <span class="absolute top-2 right-2.5 w-2 h-2 bg-danger rounded-full border-2 border-white group-hover:scale-110 transition-transform"></span>
    </button>

    <div class="h-8 w-px bg-surface-100 mx-2"></div>

    <!-- User Profile -->
    <button 
      (click)="navigateToProfile()"
      class="flex items-center space-x-3 p-1.5 pl-1.5 pr-3 rounded-2xl hover:bg-surface-50 transition-all group"
    >
      <div class="relative">
        <img
          class="h-9 w-9 rounded-xl object-cover ring-2 ring-surface-50 group-hover:ring-primary-100 transition-all"
          [src]="userAvatarUrl || userService.getDefaultAvatar()"
          alt="User"
        />
        <div class="absolute -bottom-0.5 -right-0.5 w-3 h-3 bg-success rounded-full border-2 border-white"></div>
      </div>
      <div class="hidden md:block text-left">
        <p class="text-sm font-semibold text-gray-700 leading-tight">{{ userName || 'Đang tải...' }}</p>
        <p class="text-xs text-gray-400 font-medium">System Manager</p>
      </div>
    </button>
  </div>
</div>
