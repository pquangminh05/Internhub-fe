<div class="flex h-screen bg-surface-50 overflow-hidden font-sans">
  <!-- Sidebar -->
  <aside
    class="relative z-40 h-full transition-all duration-300 ease-in-out"
    [class.w-72]="isSidebarVisible"
    [class.w-20]="!isSidebarVisible"
  >
    <app-sidebar [isSidebarVisible]="isSidebarVisible" class="h-full"></app-sidebar>
  </aside>

  <!-- Main Content Area -->
  <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
    <!-- Topbar -->
    <app-topbar 
      [isSidebarVisible]="isSidebarVisible" 
      (toggleSidebar)="toggleSidebar()"
    ></app-topbar>

    <!-- Main Content Container -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
      <div class="max-w-[1600px] mx-auto animate-fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
